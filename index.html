<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dev Notes</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Inter:wght@400;500;600&display=swap');

  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #22263a;
    --border: #2e3250;
    --green: #6ee7a0;
    --blue: #7eb8f7;
    --purple: #c4a0f5;
    --orange: #f5a66a;
    --text: #e8eaf6;
    --muted: #7b82a8;
    --mono: 'JetBrains Mono', monospace;
    --sans: 'Inter', sans-serif;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    padding: 40px 24px;
    max-width: 720px;
    margin: 0 auto;
    -webkit-font-smoothing: antialiased;
  }

  header {
    margin-bottom: 32px;
    padding-bottom: 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: baseline;
    justify-content: space-between;
  }

  .logo {
    font-family: var(--mono);
    font-size: 16px;
    font-weight: 600;
    color: var(--green);
  }

  .logo span { color: var(--muted); }

  .count {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--muted);
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 12px;
  }

  a.card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 18px 20px;
    text-decoration: none;
    color: inherit;
    display: flex;
    flex-direction: column;
    gap: 8px;
    transition: border-color 0.15s, transform 0.15s;
  }

  a.card:hover {
    border-color: color-mix(in srgb, var(--accent, var(--green)) 60%, transparent);
    transform: translateY(-2px);
  }

  .card-topic {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--accent, var(--green));
  }

  .card-title {
    font-size: 15px;
    font-weight: 600;
    color: var(--text);
    line-height: 1.3;
  }

  .card-tags {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    margin-top: 4px;
  }

  .chip {
    font-family: var(--mono);
    font-size: 10px;
    padding: 2px 7px;
    border-radius: 4px;
    background: var(--surface2);
    color: var(--muted);
    border: 1px solid var(--border);
  }
</style>
</head>
<body>

<header>
  <div class="logo">dev<span>/</span>notes</div>
  <div class="count">1 guia</div>
</header>

<div class="grid">

  <a href="compose-state-guide.html" class="card" style="--accent: var(--green)">
    <div class="card-topic">Jetpack Compose</div>
    <div class="card-title">State &amp; Effects — Guia de Decisão</div>
    <div class="card-tags">
      <span class="chip">State</span>
      <span class="chip">Effects</span>
      <span class="chip">Performance</span>
    </div>
  </a>

</div>

</body>
</html>
